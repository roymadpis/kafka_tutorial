# Use a slim Python image
FROM python:3.10-slim

# Avoid interactive prompts during apt operations
ENV DEBIAN_FRONTEND=noninteractive

# Install build deps and system binaries required by confluent-kafka and pyshark (tshark)
RUN apt-get update && \
    apt-get install -y --no-install-recommends \
      build-essential \
      librdkafka-dev \
      libsasl2-dev \
      libssl-dev \
      ca-certificates \
      tshark \
    && rm -rf /var/lib/apt/lists/*

# Set workdir and copy sources
WORKDIR /app
COPY . /app

# Install Python deps from requirements.txt
RUN pip install --no-cache-dir -r requirements.txt

# Default envs (override in OCP)
ENV PYTHONUNBUFFERED=1

# Run the driver runner that wires up MyProducer/MyConsumer and MyDriver.
CMD ["python", "driver_in_action.py"]
